# Apache VirtualHost template for rank-ed.fr
# Goal: keep API routing, serve Vue dist files, and increase logs for 500 debugging.
# Adapt paths and PHP socket/version to your server.

<VirtualHost *:80>
    ServerName rank-ed.fr
    ServerAlias www.rank-ed.fr

    # Project root where .htaccess is located
    DocumentRoot /var/www/ranked

    <Directory /var/www/ranked>
        AllowOverride All
        Require all granted
    </Directory>

    # Access/error logs
    ErrorLog ${APACHE_LOG_DIR}/ranked-error.log
    CustomLog ${APACHE_LOG_DIR}/ranked-access.log combined

    # Temporary debug level for rewrite issues (reduce to "warn" after fix)
    LogLevel warn rewrite:trace3

    # Optional explicit PHP-FPM mapping (if not already configured globally)
    #<FilesMatch \.php$>
    #    SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
    #</FilesMatch>
</VirtualHost>

