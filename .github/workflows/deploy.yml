name: RankED CD

on:
  workflow_dispatch:
  push:
    branches:
      - feature/rk-5-ci-cd

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========================
      # 1. BUILD FRONT
      # ========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build frontend
        working-directory: front
        run: |
          npm ci
          npm run build

      # ========================
      # 2. BUILD BACK
      # ========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: Install backend deps
        working-directory: back
        run: |
          composer install --no-dev --optimize-autoloader --no-scripts

      # ========================
      # 3. PREPARE ARTIFACT
      # ========================
      - name: Prepare package
        run: |
          mkdir deploy

          # Front build
          cp -r front/dist deploy/front

          # Back (sans fichiers inutiles)
          rsync -av \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='var' \
            --exclude='node_modules' \
            --exclude='tests' \
            back/ deploy/back/

          tar -czf deploy.tar.gz deploy

      # ========================
      # 4. UPLOAD TO SERVER
      # ========================
      - name: Upload via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "~/www"

      # ========================
      # 5. DEPLOY (SSH)
      # ========================
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/www

            # Backup ancienne version
            if [ ! -d "backup" ]; then
              mkdir backup
            fi
            
            BACKUP_DIR="backup/back_$(date +%s)"
            mkdir -p "$BACKUP_DIR"
            
            if [ -d "back" ]; then
              mv back "$BACKUP_DIR/back"
            fi

            tar -xzf deploy.tar.gz -C . --strip-components=1

            cd back

            if [ -f ~/www/.env.local ]; then
              cp ~/www/.env.local .env.local
            elif [ -f "$HOME/www/$BACKUP_DIR/back/.env.local" ]; then
              cp "$HOME/www/$BACKUP_DIR/back/.env.local" .env.local
            fi

            # Compiler les variables d'environnement pour prod
            composer dump-env prod

            # JWT keys (si absentes)
            mkdir -p config/jwt
            if [ ! -f config/jwt/private.pem ]; then
              openssl genrsa -out config/jwt/private.pem 2048
              openssl rsa -in config/jwt/private.pem -pubout -out config/jwt/public.pem
            fi

            # Cache Symfony
            php bin/console cache:clear --env=prod

            # Cleanup
            cd ~/www
            rm deploy.tar.gz